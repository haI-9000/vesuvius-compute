name: Vesuvius Scroll Processor

on:
  repository_dispatch:
    types: [process_patch, process_segment]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy tifffile requests Pillow

      - name: Process scroll segment
        if: github.event.action == 'process_segment'
        env:
          SEGMENT_ID:   ${{ github.event.client_payload.segment_id }}
          SCROLL_PATH:  ${{ github.event.client_payload.scroll_path }}
          LAYER:        ${{ github.event.client_payload.layer }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          JOB_ID:       ${{ github.event.client_payload.job_id }}
          RECEIPT_ID:   ${{ github.event.client_payload.receipt_id }}
        run: python scripts/process_segment.py
