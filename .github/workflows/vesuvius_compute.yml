name: Vesuvius Scroll Processor

on:
  repository_dispatch:
    types: [process_patch, process_segment]

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy torch tifffile requests boto3 Pillow transformers accelerate safetensors

      - name: Process scroll patch
        if: github.event.action == 'process_patch'
        env:
          SCROLL_ID:    ${{ github.event.client_payload.scroll_id }}
          X:            ${{ github.event.client_payload.x }}
          Y:            ${{ github.event.client_payload.y }}
          Z:            ${{ github.event.client_payload.z }}
          PATCH_SIZE:   ${{ github.event.client_payload.patch_size }}
          THRESHOLD:    ${{ github.event.client_payload.threshold }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          JOB_ID:       ${{ github.event.client_payload.job_id }}
          RECEIPT_ID:   ${{ github.event.client_payload.receipt_id }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python scripts/process_patch.py

      - name: Process scroll segment
        if: github.event.action == 'process_segment'
        env:
          SEGMENT_ID:   ${{ github.event.client_payload.segment_id }}
          SCROLL_PATH:  ${{ github.event.client_payload.scroll_path }}
          LAYER:        ${{ github.event.client_payload.layer }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          JOB_ID:       ${{ github.event.client_payload.job_id }}
          RECEIPT_ID:   ${{ github.event.client_payload.receipt_id }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python scripts/process_segment.py
